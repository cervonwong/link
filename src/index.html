  <link rel="apple-touch-icon" sizes="120x120" href="icons/apple-icon-120x120.png">

  <link rel="apple-touch-icon" sizes="152x152" href="icons/apple-icon-152x152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-icon-180x180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/android-icon-192x192.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="96x96" href="icons/favicon-96x96.png">

  <!--  Google Fonts -->

    href="https://fonts.googleapis.com/css2?family=Commissioner:wght@500..800&family=Fraunces:opsz,wght,SOFT,WONK@9..144,420,0..100,1&display=swap"
    rel="stylesheet">
  <!--  TODO: Use SVGs instead of CDN font for speed and to prevent swap rendering -->
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500..700,0,0"/>

  <style>
    html {
      background: #FAF6DB;
      height: 100%;
    }

    body {
      height: 100%;
      display: flex;
      /* Prevent weird horizontal scrolling because content drawn under scrollbar. Might need to remove when making responsive design.  */
      overflow-x: hidden;
    }

    main {
      /* flex to expand to body height and width. */
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      padding: clamp(1rem, 0.5rem + 2vh, 3rem) 0 0 0;
      width: 100%;
      /*height: 100%;*/
    }

    .heading-group {
    }

    nav {
      display: flex;
      flex-direction: column;
      background: #F7EFC8;
      /* flex to expand to body height.*/
      flex: 1;
      width: 100vw;
      align-items: center;
      position: relative;
      margin-top: clamp(2rem, 1rem + 4vh, 5rem);
      animation: navIn 1.5s ease-in-out;
      animation-fill-mode: both;
    }

    @media (min-width: 50rem) {
      main {
        display: block;
        align-items: start;
      }

      .heading-group {
        position: fixed;
        width: 50%;
        margin: 0 clamp(1.5rem, 1rem + 2vw, 3rem) 0 clamp(1rem, 0.5rem + 1.5vw, 2rem);
      }

      nav {
        background-color: transparent;
        position: absolute;
        right: 0;
        bottom: 0;
        width: 60%;
        animation: navIn 1.5s ease-in-out;
        animation-delay: 0.6s;
        animation-fill-mode: both;
      }

      @media (max-height: 40rem) {
        nav {
          top: 0;
          bottom: auto;
        }
      }
    }

    @keyframes navIn {
      0% {
        translate: 0 6rem;
      }
      100% {
        translate: 0 0;
      }
    }

    h1 {
      font-family: 'Fraunces', serif;
      font-weight: 500;
      font-variation-settings: "wght" 420, "SOFT" 100, "WONK" 1;
      font-size: clamp(1rem, 0.5rem + 1.5vw, 2rem);
      text-align: center;
      margin: 0 1rem 0.2rem;
      animation: h1In 0.8s ease-out;
      animation-fill-mode: both;
    }

    @media (min-width: 50rem) {
      h1 {
        text-align: left;
        margin: 1rem 0;
      }
    }

    @keyframes h1In {
      0% {
        translate: 0 1rem;
        opacity: 0;
      }
      100% {
        translate: 0 0;
        opacity: 1;
      }
    }

    @media (min-width: 50rem) {
      @keyframes h1In {
        0% {
          translate: 0 5rem;
          opacity: 0;
        }
        100% {
          translate: 0 0;
          opacity: 1;
        }
      }
    }

    h2 {
      font-family: 'Fraunces', serif;
      font-weight: 500;
      font-variation-settings: "wght" 420, "SOFT" 100, "WONK" 1;
      font-size: clamp(2.5rem, 1rem + 5vw, 7rem);
      line-height: 1.15;
      text-align: center;
      margin: 0 1rem 0;
      animation: h2In 1.0s ease-out;
      animation-fill-mode: both;
    }

    @media (min-width: 50rem) {
      h2 {
        margin: 0;
        text-align: start;
        animation: h2In 1.2s ease-out;
        animation-delay: 0.2s;
        animation-fill-mode: both;
      }
    }

    @keyframes h2In {
      0% {
        translate: 0 1rem;
        scale: 0.7;
        opacity: 0;
      }
      100% {
        translate: 0 0;
        scale: 1;
        opacity: 1;
      }
    }

    @media (min-width: 50rem) {
      @keyframes h2In {
        0% {
          translate: -5rem 5rem;
          scale: 0.7;
          opacity: 0;
        }
        100% {
          translate: 0 0;
          scale: 1;
          opacity: 1;
        }
      }
    }

    ul.signs {
      /* flex to expand to body height.*/
      flex: 1;
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      justify-content: start;
      align-items: center;
      gap: 0;
      list-style: none;
      padding: 0;
      margin: clamp(0.8rem, 0.5rem + 1vw, 1.6rem) 0 clamp(0.4rem, 0.2rem + 0.5vw, 0.8rem) 0;
    }

    li {
      list-style: none;
      margin: 0;
      padding: 0;
      text-indent: 0;
      animation: pulse 14s ease-in-out infinite;
      animation-delay: calc(2s + var(--i) * 0.2s);
    }

    a {
      display: flex;
      align-items: center;
      font-family: 'Commissioner', sans-serif;
      font-variation-settings: "wght" 500;
      font-size: clamp(1rem, 0.8rem + 0.5vw, 1.4rem);
      line-height: 1.4;
      color: black;
      text-decoration: none;
      padding: clamp(1rem, 0.8rem + 0.5vw, 1.6rem) clamp(0.8rem, 0.5rem + 0.5vw, 1.4rem);
      height: clamp(2.5rem, 2rem + 1vw, 3.5rem);
      width: clamp(9rem, 7rem + 4vw, 14rem);
      background-repeat: no-repeat;
      text-align: start;
      background-size: 100% 100%;
      transition: all 0.2s ease-in-out;
      filter: drop-shadow(2px 3px 0px black);
    }

    span.sign_text {
      flex: 1;
    }

    a.sign_left > span.sign_text {
      margin-left: clamp(0.5rem, 0.3rem + 0.4vw, 1rem);
    }

    a.sign_right > span.sign_text {
      margin-right: clamp(0.3rem, 0.2rem + 0.3vw, 0.6rem);
    }

    a.sign_right {
      flex-direction: row;
      background-image: url("svg/sign_right_200x74.svg");
      margin-left: clamp(2rem, 1rem + 6vw, 10rem);
      transform: rotate(-2deg) translate(0, 0);
      animation: signRightIn 0.5s ease-out backwards;
      animation-delay: calc(var(--i) * 0.12s);
    }

    a.sign_left {
      flex-direction: row-reverse;
      background-image: url("svg/sign_left_200x74.svg");
      margin-right: clamp(2rem, 1rem + 6vw, 10rem);
      transform: rotate(2deg) translate(0, 0);
      animation: signLeftIn 0.5s ease-out backwards;
      animation-delay: calc(var(--i) * 0.12s);
    }

    a.sign_right:hover {
      transition: all 0.2s ease-in-out;
      font-variation-settings: "wght" 700;
      transform: rotate(0deg) translate(-3px, -2px) scale(104%);
      /*transform: perspective(16rem) rotateY(-6deg) translate(-3px, -2px) scale(106%);*/
      filter: drop-shadow(6px 6px 0px black);
    }

    a.sign_left:hover {
      transition: all 0.2s ease-in-out;
      font-variation-settings: "wght" 700;
      transform: rotate(0deg) translate(-3px, -2px) scale(104%);
      /*transform: perspective(16rem) rotateY(6deg) translate(-3px, -2px) scale(106%);*/
      filter: drop-shadow(6px 6px 0px black);
    }

    @media (min-width: 50rem) {
      a.sign_right:hover {
        transform: rotate(0deg) translate(-3px, -2px) scale(110%) perspective(6rem) rotateY(-6deg) translate(-3px, -2px);
      }

      a.sign_left:hover {
        transform: rotate(0deg) translate(-3px, -2px) scale(110%) perspective(6rem) rotateY(6deg) translate(-3px, -2px);
      }
    }

    a:active {
      transition: all 0.1s ease-in-out;
      font-variation-settings: "wght" 700;
    }

    a.sign_right:active {
      transform: rotate(-2deg) translate(0px, 0px) scale(97%);
      /*transform: perspective(16rem) rotateY(-9deg) translate(0px, 0px) scale(97%);*/
      filter: drop-shadow(0px 0px 0px black);
    }

    a.sign_left:active {
      transform: rotate(2deg) translate(0px, 0px) scale(97%);
      /*transform: perspective(16rem) rotateY(9deg) translate(0px, 0px) scale(97%);*/
      filter: drop-shadow(0px 0px 0px black);
    }


    @keyframes signRightIn {
      0% {
        transform: rotate(0deg) translate(1rem, 2rem) scale(90%);
        opacity: 0;
      }
      100% {
        transform: rotate(-2deg) translate(0, 0);
        opacity: 1;
      }
    }

    @keyframes signLeftIn {
      0% {
        transform: rotate(0deg) translate(-1rem, 2rem) scale(90%);
        opacity: 0;
      }
      100% {
        transform: rotate(2deg) translate(0, 0);
        opacity: 1;
      }
    }

    @media (min-width: 50rem) {
      a.sign_right, a.sign_left {
        animation-delay: calc(0.4s + var(--i) * 0.12s);
      }
    }

    /* Gradient fade of pole*/
    nav:after {
      content: "";
      z-index: 4;
      width: 10%;
      position: relative;
      height: 3rem;
      bottom: -1px;
      background-image: linear-gradient(rgba(247, 239, 200, 0%) 0, rgba(247, 239, 200, 100%) 95%);
    }

    /* Oval top for yellow container */
    @media (max-width: 50rem) {
      nav:before {
        content: "";
        position: absolute;
        z-index: -1;
        background-color: #F7EFC8;
        width: 100%;
        border-radius: 50%;
        top: -3rem;
        height: 6rem;
        animation: 1.0s ease-out navBeforeInMobile;
      }
    }

    @media (min-width: 50rem) {
      nav:before {
        content: none;
      }
    }

    @keyframes navBeforeInMobile {
      0% {
        top: 0;
        height: 0;
      }
      100% {
        top: -3rem;
        height: 6rem;
      }
    }

    div.pole {
      position: absolute;
      z-index: 3;
      top: 1rem;
      bottom: 0;
      padding-bottom: 2rem;
      width: 0.7rem;
      background-color: #FBE780;
      border: black 0.15rem solid;
      border-bottom: transparent;
      border-radius: 0;
      animation: poleIn 0.5s ease-out 0.5s;
      animation-fill-mode: both;
    }

    @media (min-width: 50rem) {
      div.pole {
        animation: poleIn 1.0s ease-out 0.8s;
        animation-fill-mode: both;
      }
    }

    @keyframes poleIn {
      0% {
        translate: 0 2rem;
        opacity: 0;
      }
      100% {
        translate: 0 0;
        opacity: 1;
      }
    }

    @media (min-width: 50rem) {
      @keyframes poleIn {
        0% {
          translate: 0 4rem;
          opacity: 0;
        }
        100% {
          translate: 0 0;
          opacity: 1;
        }
      }
    }

    div.pole:before {
      content: "";
      position: absolute;
      z-index: 10;
      background-color: #FFCA1B;
      border: black 0.15rem solid;
      border-radius: 50%;
      top: -1.3rem;
      height: 1.4rem;
      width: 1.4rem;
      left: 0;
      right: 0;
      margin-left: -0.5rem;
    }

    .sign_icon.material-symbols-outlined {
      transition: all 0.2s ease-in-out;
      width: clamp(1.2rem, 1rem + 0.4vw, 1.8rem);
      font-size: clamp(1.2rem, 1rem + 0.4vw, 1.8rem);
      color: #FFCA1B;
      font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 48;
    }

    a:hover > .sign_icon.material-symbols-outlined {
      transition: all 0.2s ease-in-out;
      font-variation-settings: 'FILL' 0, 'wght' 700, 'GRAD' 0, 'opsz' 48;
      color: #F5A700;
    }


    @keyframes pulse {
      0% {
        transform: scale(1);
      }
      47% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.05);
      }
      53% {
        transform: scale(1);
      }
      100% {
        transform: scale(1);
      }
    }

    @media (min-width: 50rem) {
      #background-circle {
        content: "";
        position: fixed;
        z-index: -1;
        background-color: #F7EFC8;
        border-radius: 50%;
        bottom: -40%;
        right: -11%;
        height: 74vw;
        width: 74vw;
        animation: backgroundCircleIn 1.5s ease;
        animation-delay: 0.4s;
        animation-fill-mode: both;
      }
    }

    @keyframes backgroundCircleIn {
      0% {
        transform: scale(0.01);
      }
      100% {
        transform: scale(1.0);
      }
    }
  </style>
</head>

<body>

  <!-- For desktop screens, animate circle expanding and retracting on scroll. -->
  <script>
    var circle = document.getElementById("background-circle");
    var isExpanded = false;
    var isAnimating = false;

    window.addEventListener('scroll', () => {
      if (isAnimating) return;
      if (window.scrollY !== 0) {
        if (isExpanded) return;
        isAnimating = true;
        circle.animate(
          [{transform: "scale(1.0)"}, {transform: "scale(3.0)"}],
          {duration: 600, iterations: 1, easing: "cubic-bezier(0.60, 0, 1, 1)", fill: "forwards",}
        ).onfinish = (_) => {
          isAnimating = false;
        };
        isExpanded = true;
      } else {
        if (!isExpanded) return;
        isAnimating = true;
        circle.animate(
          [{transform: "scale(3.0)"}, {transform: "scale(1.0)"}],
          {
            duration: 1000,
            iterations: 1,
            easing: "cubic-bezier(0.20, 0, 0.40, 1)",
            fill: "forwards",
            composite: "replace"
          }
        ).onfinish = (_) => {
          isAnimating = false;
        };
        isExpanded = false;
      }
    }, false);
  </script>

  <script src="js/vendor/modernizr-3.11.2.min.js"></script>
  <script src="js/plugins.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
